version: "3.9"

services:
  api:
    build: ./backend
    container_name: pulse-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Inside Docker network, backend must use service hostname, not localhost.
      MONGODB_URI: mongodb://mongo:27017/pulse_db
      # Match published port 5000 below (overrides host .env if PORT=5001).
      PORT: "5000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: pulse-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
